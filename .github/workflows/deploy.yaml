name: Deploy MultiK8s

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/925006471178/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ga-deployer@multi-k8s-493617.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: multi-k8s-493617

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: multi-k8s
          location: us-central1

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s





